<svg width="1280" height="200" viewBox="0 0 1280 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentTop" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#388bfd"/>
      <stop offset="65%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.75" fill="#1c2128"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="200" fill="url(#bg)"/>
  <rect width="1280" height="200" fill="url(#dots)"/>
  <rect width="1280" height="200" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="600" height="2" fill="url(#accentTop)"/>

  <!-- Left accent bar -->
  <rect x="64" y="58" width="3" height="84" rx="1.5" fill="#388bfd"/>

  <!-- Title -->
  <text x="84" y="113"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="56"
    font-weight="700"
    fill="#e6edf3"
    letter-spacing="-1.5">deal-detector</text>

  <!-- Tagline -->
  <text x="87" y="150"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="17"
    font-weight="400"
    fill="#7d8590">Backend engine for detecting underpriced marketplace listings</text>

  <!-- Bottom border -->
  <rect x="0" y="198" width="1280" height="2" fill="#21262d"/>
</svg>

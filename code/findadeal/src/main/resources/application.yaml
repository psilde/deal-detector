spring:
  config:
    import: optional:file:./local.properties
  application:
    name: findadeal
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    expiration-minutes: 60
  scraper:
    base-url: http://localhost:8081
    page-size: 200

logging:
  level:
    root: INFO
    com.findadeal: DEBUG

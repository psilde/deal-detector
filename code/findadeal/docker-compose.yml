services:
  findadeal_postgres_v2:
    image: postgres:16
    container_name: findadeal-postgres-v2
    environment:
      POSTGRES_DB: findadeal_v2
      POSTGRES_USER: findadeal_user
      POSTGRES_PASSWORD: findadeal_pass
    ports:
      - "5438:5432"
    volumes:
      - findadeal_pgdata_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findadeal_user -d findadeal_v2"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  findadeal_pgdata_v2:
